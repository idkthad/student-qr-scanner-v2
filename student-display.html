<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Student Display</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="student-display">

    <div id="cameraPlaceholder">

        <h2>📷 Camera is OFF</h2>

        <p>Please wait for the security guard.</p>

    </div>

    <div id="studentResult">

        <img
            id="studentPhoto"
            src="No Profile.png"
            class="display-photo">

        <h1 id="studentName">

            READY TO SCAN

        </h1>

        <h2 id="studentCourse">

            Waiting for Student...

        </h2>

        <div id="studentStatus" class="display-status">

            Please present your QR Code

        </div>

    </div>

</div>

<script src="student-display.js"></script>

</body>

</html>
