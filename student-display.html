<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Student Display</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="student-display">

    <div class="display-header">

        <h1>Balangiga National Agricultural School</h1>

        <h2>Student QR Access Management System</h2>

    </div>

    <div id="cameraPlaceholder" class="camera-placeholder">

        <div class="camera-icon">📷</div>

        <h2>Waiting for QR Scan</h2>

        <p>Please present your Student ID.</p>

    </div>

    <div id="studentCard" style="display:none;">

        <img
            id="studentPhoto"
            src="No Profile.png"
            class="display-photo">

        <h1 id="studentName"></h1>

        <h2 id="studentCourse"></h2>

        <h3 id="studentYear"></h3>

        <h3 id="studentSection"></h3>

        <div
            id="studentStatus"
            class="display-status">

        </div>

    </div>

</div>

<script src="student-display.js"></script>

</body>

</html>
