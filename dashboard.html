<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>BNAS Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="header">

        <div class="logos">

            <img src="BNAS Logo.png" class="logo-left">

            <div class="title">

                <h1>Balangiga National Agricultural School</h1>

                <h2>Student Access Management Dashboard</h2>

                <p>Administrator Panel</p>
                
<div id="datetime">

    <div id="currentDate"></div>

    <div id="currentTime"></div>

</div>

            </div>

            <img src="TESDA Logo.png" class="logo-right">

        </div>

    </div>

    <div class="dashboard-cards">

        <div class="card">

            <h3>Today's Entries</h3>

            <h1 id="entries">0</h1>

        </div>

        <div class="card">

            <h3>Today's Exits</h3>

            <h1 id="exits">0</h1>

        </div>

        <div class="card">

            <h3>Students Inside</h3>

            <h1 id="inside">0</h1>

        </div>

        <div class="card">

            <h3>Inactive Attempts</h3>

            <h1 id="inactive">0</h1>

        </div>

    </div>

<div class="logs-header">

    <h2>Today's Logs</h2>

    <input
        type="text"
        id="searchBox"
        placeholder="🔍 Search Student ID or Name">

</div>
    <table id="logsTable">

        <thead>

            <tr>

                <th>Time</th>
                <th>Student ID</th>
                <th>Name</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

</div>

<script src="dashboard.js"></script>

</body>

</html>

<div class="dashboard-buttons">

        <button onclick="loadDashboard()">
        🔄 Refresh
    </button>

    <button onclick="window.location.href='index.html'">
        📷 Scanner
    </button>

</div>
