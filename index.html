<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Student QR Scanner System</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="container">

<div class="header">

<div class="logos">

    <img src="BNAS Logo.png" class="logo-left">

    <div class="title">

        <h1>Balangiga National Agricultural School</h1>

        <h2>Student QR Access Management System</h2>

        <p>Security Gate Scanner</p>

    </div>

    <img src="TESDA Logo.png" class="logo-right">

</div>

<p class="subtitle">
Balangiga Eastern Samar
</p>

<div id="clock"></div>

<button id="startCamera">
📷 Start Camera
</button>

<div id="reader"></div>

<input
id="scanner"
type="text"
placeholder="Scan or Enter Student ID"
autocomplete="off">

<div id="result">

    <div class="waiting">

        <h2>READY TO SCAN</h2>

        <p>Please present the student's QR Code.</p>

    </div>

</div>

</div> <!-- closes header -->

</div> <!-- closes container -->

<script src="script.js"></script>

</body>

</html>
