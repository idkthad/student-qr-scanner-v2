<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Student QR Scanner System</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="container">

<h1>🎓 Student QR Scanner System</h1>

<p class="subtitle">
Balangiga National Agricultural School
</p>

<div id="clock"></div>

<button id="startCamera">
📷 Start Camera
</button>

<div id="reader"></div>

<input
id="scanner"
type="text"
placeholder="Scan or Enter Student ID"
autocomplete="off">

<div id="result">

<div class="waiting">

<h2>READY TO SCAN</h2>

<p>Please present the student's QR Code.</p>

</div>

</div>
    
<script src="script.js"></script>

</body>

</html>
